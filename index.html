<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Uma surpresa ❤️</title>

    <link rel="stylesheet" href="estilo.css">
</head>


<body>


<section class="entrada" id="entrada">

    <div class="carta">

        <h1>Tenho uma surpresa para você ❤️</h1>

        <p>
            Fiz isso com carinho, para guardar alguns momentos especiais.
        </p>


        <button onclick="abrirSurpresa()">
            Abrir surpresa ✨
        </button>


    </div>

</section>




<main id="surpresa" class="escondido">


    <h1 class="titulo">
        Alguns momentos especiais ❤️
    </h1>


    <div class="galeria">

        <img src="fotos/foto1.jpg">
        <img src="fotos/foto2.jpg">
        <img src="fotos/foto3.jpg">
        <img src="fotos/foto4.jpg">
        <img src="fotos/foto5.jpg">
        <img src="fotos/foto6.jpg">
        <img src="fotos/foto7.jpg">

    </div>



    <div class="final">

        <h2>
            Obrigado por fazer parte da minha história ❤️
        </h2>


        <p>
            Cada momento fica mais especial quando é compartilhado com alguém importante.
        </p>


    </div>


</main>



<script src="script.js"></script>


</body>

</html>
